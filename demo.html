<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心理健康自评系统 - 动画演示</title>
  <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.demo-container {
  width: 380px;
  height: 680px;
  background: #fff;
  border-radius: 40px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  overflow: hidden;
  position: relative;
  border: 8px solid #222;
}
.phone-notch {
  width: 120px;
  height: 24px;
  background: #222;
  border-radius: 0 0 14px 14px;
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
}
.screen {
  width: 100%;
  height: 100%;
  overflow: hidden;
  position: relative;
}
</style>
</head>
<body>
  <!-- 演示标题 -->
  <h1 id="demoTitle" style="color:#fff;font-size:22px;margin-bottom:20px;opacity:0;
    transition:opacity 0.8s">大学生心理健康自评系统 - 动画演示</h1>

  <!-- 手机模拟框 -->
  <div class="demo-container">
    <div class="phone-notch"></div>
    <div class="screen" id="screen"></div>
  </div>

  <!-- 进度指示 -->
  <div id="stepInfo" style="color:rgba(255,255,255,0.7);margin-top:20px;font-size:14px;
    opacity:0;transition:opacity 0.5s"></div>

  <script src="js/demo.js"></script>
</body>
</html>
