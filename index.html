<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="心理自评">
  <meta name="theme-color" content="#667eea">
  <title>大学生心理健康自评系统</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">

    <!-- 首页 -->
    <div id="home" class="page active">
      <div class="card">
        <h1 class="home-title">大学生心理健康自评系统</h1>
        <p class="home-subtitle">关爱自己，从了解自己开始</p>

        <div class="color-legend">
          <span class="legend-item"><span class="legend-dot dot-green"></span>健康</span>
          <span class="legend-item"><span class="legend-dot dot-yellow"></span>轻微</span>
          <span class="legend-item"><span class="legend-dot dot-orange"></span>中等</span>
          <span class="legend-item"><span class="legend-dot dot-red"></span>需关注</span>
        </div>

        <p style="text-align:center;font-size:14px;color:#555;margin:20px 0;line-height:1.8">
          本系统基于 SCL-90 症状自评量表，帮助您快速了解自身心理健康状况。<br>
          共 90 道题目，根据最近一周的实际感受作答，约需 10-15 分钟。
        </p>

        <div class="privacy-note">
          您的评估数据仅保存在本地浏览器中，不会上传至任何服务器。
        </div>

        <button class="btn btn-primary" onclick="startTest()">开始自评</button>
      </div>
    </div>

    <!-- 评估页 -->
    <div id="test" class="page">
      <div class="card">
        <p class="progress-text" id="progressText">第 1-10 题 / 共 90 题</p>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>

        <p style="font-size:13px;color:#888;margin-bottom:20px;text-align:center">
          请根据最近一周的实际感受选择最符合的选项
        </p>

        <div id="questionList"></div>

        <div class="nav-buttons">
          <button class="btn-nav btn-prev" id="btnPrev" onclick="prevPage()">上一页</button>
          <button class="btn-nav btn-next" id="btnNext" onclick="nextPage()">下一页</button>
        </div>
      </div>
    </div>

    <!-- 结果页 -->
    <div id="result" class="page">
      <div class="card">
        <h2 style="text-align:center;color:#4a4a8a;margin-bottom:20px">评估结果</h2>
        <div id="resultContent"></div>
      </div>
    </div>

  </div>

  <script src="js/questions.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
